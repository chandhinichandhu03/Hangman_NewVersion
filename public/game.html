<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Hangman Quest</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Scripts for PDF/Excel generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .gallows {
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .man {
            fill: none;
            stroke: var(--text-main);
            stroke-width: 4;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .man.visible {
            opacity: 1;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body>
    <header class="header glass-panel" style="border-radius: 0; border-top: 0;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="dashboard.html" class="btn-secondary" style="padding: 8px 12px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
            <div id="game-info">
                <span id="display-category" style="text-transform: capitalize; font-weight: 600;">Category</span>
                <span style="color: var(--text-muted); margin: 0 10px;">•</span>
                <span id="display-difficulty" style="text-transform: capitalize; color: var(--text-muted);">Easy</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button id="quit-quest-btn" class="btn-secondary"
                style="padding: 8px 16px; border-color: var(--danger); color: var(--danger);">QUIT QUEST</button>
            <button id="theme-toggle" class="btn-secondary" style="padding: 8px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
            </button>
            <div id="score-display" style="font-weight: 800; font-size: 1.2rem; color: var(--primary-color);">Score: 0
            </div>
        </div>
    </header>

    <main class="game-container animate-fade-in">
        <!-- New Tech Hangman Section -->
        <div class="glass-panel hangman-svg-container" style="flex-direction: column;">
            <svg width="300" height="350" viewBox="0 0 300 350" class="glow-svg">
                <!-- Cyber Gallows -->
                <rect x="40" y="320" width="220" height="10" rx="5" fill="var(--primary-color)" opacity="0.3" />
                <rect x="70" y="20" width="10" height="300" rx="5" fill="var(--primary-color)" opacity="0.3" />
                <rect x="70" y="20" width="130" height="10" rx="5" fill="var(--primary-color)" opacity="0.3" />
                <line x1="200" y1="30" x2="200" y2="70" stroke="var(--primary-color)" stroke-width="4"
                    stroke-dasharray="5 5" opacity="0.5" />

                <!-- Cyber Man Parts (Geometric Neon Style) -->
                <circle id="part-0" class="man hangman-part" cx="200" cy="100" r="25" stroke="var(--secondary-color)"
                    stroke-width="4" fill="none" />
                <line id="part-1" class="man hangman-part" x1="200" y1="125" x2="200" y2="220" stroke="var(--text-main)"
                    stroke-width="4" />
                <path id="part-2" class="man hangman-part" d="M200 140 L160 180" stroke="var(--primary-color)"
                    stroke-width="4" />
                <path id="part-3" class="man hangman-part" d="M200 140 L240 180" stroke="var(--primary-color)"
                    stroke-width="4" />
                <path id="part-4" class="man hangman-part" d="M200 220 L160 280" stroke="var(--text-muted)"
                    stroke-width="4" />
                <path id="part-5" class="man hangman-part" d="M200 220 L240 280" stroke="var(--text-muted)"
                    stroke-width="4" />
            </svg>

            <!-- AI Hint Button -->
            <button id="ai-hint-btn" class="ai-hint-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a10 10 0 1 0 10 10H12V2z" />
                    <path d="M12 2a10 10 0 0 1 10 10h-2a8 8 0 0 0-8-8V2z" />
                </svg>
                <span>Ask AI for Hint</span>
            </button>
            <p id="hint-text"
                style="margin-top: 10px; font-style: italic; color: #8b5cf6; font-size: 0.9rem; min-height: 20px;"></p>
        </div>

        <!-- Controls Section -->
        <div class="glass-panel"
            style="padding: 30px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="color: var(--text-muted);">GUESS THE WORD</h3>
                    <div
                        style="background: var(--bg-dark); padding: 4px 12px; border-radius: 20px; font-weight: 800; border: 1px solid var(--glass-border);">
                        ROUND <span id="round-count">1</span>
                    </div>
                </div>
                <div id="word-display" class="word-display">
                    <!-- Letter slots go here -->
                </div>
            </div>

            <div>
                <div id="keyboard" class="keyboard">
                    <!-- Keyboard keys go here -->
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <div style="color: var(--text-muted);">
                        Lives Left: <span id="lives-count" style="color: var(--danger); font-weight: 800;">6</span>
                    </div>
                    <div id="streak-display" style="color: var(--warning); font-weight: 600; font-size: 0.9rem;">
                        🔥 Streak: 0
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Game Over Modal -->
    <div id="modal-overlay">
        <div class="glass-panel animate-fade-in"
            style="max-width: 400px; width: 90%; padding: 40px; text-align: center;">
            <h2 id="modal-title" style="font-size: 2.5rem; margin-bottom: 10px;">YOU WIN!</h2>
            <p id="modal-msg" style="color: var(--text-muted); margin-bottom: 24px;">The word was: <span
                    id="target-word" style="color: white; font-weight: 800;">APPLE</span></p>
            <div id="modal-score"
                style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color); margin-bottom: 20px;">+150
                Points</div>

            <div id="download-section" style="margin-bottom: 24px;">
                <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 12px;">Download Your Result Report
                </p>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                    <button onclick="window.game.downloadResult('pdf')" class="btn-secondary"
                        style="padding: 6px; font-size: 0.7rem;">PDF</button>
                    <button onclick="window.game.downloadResult('docx')" class="btn-secondary"
                        style="padding: 6px; font-size: 0.7rem;">DOCX</button>
                    <button onclick="window.game.downloadResult('xlsx')" class="btn-secondary"
                        style="padding: 6px; font-size: 0.7rem;">XLSX</button>
                    <button onclick="window.game.downloadResult('csv')" class="btn-secondary"
                        style="padding: 6px; font-size: 0.7rem;">CSV</button>
                    <button onclick="window.game.downloadResult('txt')" class="btn-secondary"
                        style="padding: 6px; font-size: 0.7rem;">TXT</button>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button id="modal-restart-btn" class="btn-primary" style="width: 100%;">START NEW QUEST</button>
                <a href="dashboard.html" class="btn-secondary" style="width: 100%;">BACK TO DASHBOARD</a>
            </div>
        </div>
    </div>

    <!-- Audios (Synthetic triggers) -->
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="sound-lose" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
